name: 🔧 CI Pipeline

on:
  push:
    branches:
      - main
      - feature/**
      - bugfix/**
      - hotfix/**
      - fix/**
    tags:
      - 'v*'
  pull_request: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: 🧹 Lint
    runs-on: ubuntu-latest
    container:
      image: node:22-alpine
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npx eslint .

  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    container:
      image: node:22-alpine
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install dependencies
        run: npm ci
      - name: Run Jest
        run: npm test
        env:
          TZ: Europe/Paris

  build-staging:
    name: 🛠️ Build (Staging)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test]
    uses: ./.github/workflows/build.yml
    with:
      tag: staging
    secrets: inherit

  build-production:
    name: 🛠️ Build (Production)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test]
    uses: ./.github/workflows/build.yml
    with:
      tag: production
    secrets: inherit

  build-branch:
    name: 🛠️ Build (Branch)
    if: |
      startsWith(github.ref, 'refs/heads/feature/') ||
      startsWith(github.ref, 'refs/heads/bugfix/') ||
      startsWith(github.ref, 'refs/heads/hotfix/')
    needs: [lint, test]
    uses: ./.github/workflows/build.yml
    with:
      tag: branch-${{ github.sha }}
    secrets: inherit

  deploy-staging:
    name: 🚀 Deploy Staging
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-staging]
    uses: ./.github/workflows/deploy-staging.yml
    secrets: inherit

  deploy-production:
    name: 🚀 Deploy Production
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [deploy-staging]
    uses: ./.github/workflows/deploy-prod.yml
    secrets: inherit
