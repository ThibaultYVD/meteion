name: 🚀 Deploy to Production

on:
  workflow_call: {}
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: self-hosted
    environment: production
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Deploy Production
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "mkdir -p ~/deployments/meteion-prod"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            docker-compose.yml \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/deployments/meteion-prod/

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            cd ~/deployments/meteion-prod &&
            docker pull thibaultyvd/meteion:production &&
            APP_ENV='${{ secrets.APP_ENV }}' \
            DB_USER='${{ secrets.DB_USER }}' \
            DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
            MYSQL_ROOT_PASSWORD='${{ secrets.DB_PASSWORD }}' \
            MYSQL_PASSWORD='${{ secrets.DB_PASSWORD }}' \
            DB_NAME='${{ secrets.DB_NAME }}' \
            TOKEN='${{ secrets.TOKEN }}' \
            CLIENT_ID='${{ secrets.CLIENT_ID }}' \
            SUPERADMIN1='${{ secrets.SUPERADMIN1 }}' \
            IMAGE_BASE_URL='${{ secrets.IMAGE_BASE_URL }}' \
            docker compose -p meteion-prod -f docker-compose.yml down &&
            docker compose -p meteion-prod -f docker-compose.yml up -d &&
            docker image prune -f
          "

      - name: Run Sequelize Migrations (Production)
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "docker exec meteion npx sequelize-cli db:migrate --env production"
