name: 🚀 Deploy to Production

on:
  workflow_call: {}
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: self-hosted
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Deploy Production
        env:
          APP_ENV: ${{ secrets.APP_ENV }}
          DB_HOST: database
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          TOKEN: ${{ secrets.TOKEN }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          SUPERADMIN1: ${{ secrets.SUPERADMIN1 }}
        run: |
          docker pull thibaultyvd/meteion:production
          docker compose -p meteion-prod -f docker-compose.yml down
          docker compose -p meteion-prod -f docker-compose.yml up -d
          docker image prune -f

      - name: Health Check
        run: |
          for i in $(seq 1 12); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' meteion 2>/dev/null)
            [ "$STATUS" = "healthy" ] && exit 0
            echo "Attempt $i/12: $STATUS"
            sleep 5
          done
          echo "Health check failed"
          docker logs meteion --tail 50
          exit 1

      - name: Run Sequelize Migrations (Production)
        run: |
          docker exec meteion npx sequelize-cli db:migrate --env production
