services:
  app:
    build:
      .
    environment:
      - APP_ENV
      - DB_HOST=database
      - DB_USER
      - DB_PASSWORD
      - DB_NAME
      - TOKEN
      - CLIENT_ID
      - IMAGE_BASE_URL
      - TZ=Europe/Paris
      - NODE_ENV=production
    container_name: meteion
    image: thibaultyvd/meteion:production
    restart: unless-stopped
    ports:
      - '2022:3000'
    depends_on:
      database: 
        condition: service_healthy
    networks:
      - npm-network
      - meteion-prod-net

  database:
    image: mysql:8.0
    container_name: meteion_db
    environment:
      - MYSQL_ROOT_PASSWORD
      - MYSQL_DATABASE=meteion_db
      - TZ=Europe/Paris
    restart: always
    ports:
      - '33060:3306'
    volumes:
      - db_data_production:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s                                                                                             
    networks:                                                                                                          
      - meteion-prod-net

networks:
  npm-network:
    external: true
  meteion-prod-net:                                                                                                    
    driver: bridge
    
volumes:
  db_data_production:
