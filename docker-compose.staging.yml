services:
  app:
    environment:
      - APP_ENV
      - DB_HOST=database
      - DB_USER
      - DB_PASSWORD
      - DB_NAME
      - DB_PORT=3306
      - TOKEN
      - CLIENT_ID
      - IMAGE_BASE_URL
      - TZ=Europe/Paris
      - NODE_ENV=staging
    container_name: meteion_staging
    image: thibaultyvd/meteion:staging
    restart: unless-stopped
    ports:
      - "20221:3000"
    depends_on:
      - database
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - npm-network

  database:
    container_name: meteion_db_staging
    environment:
      - MYSQL_ROOT_PASSWORD
      - MYSQL_DATABASE=meteion_db_staging
      - MYSQL_USER=meteion
      - TZ=Europe/Paris
    image: mysql:8.0
    restart: always
    ports:
      - "33061:3306"
    volumes:
      - db_data_staging:/var/lib/mysql
      - ./scripts/init_staging.sql:/docker-entrypoint-initdb.d/init_staging.sql

networks:
  npm-network:
    external: true

volumes:
  db_data_staging:
