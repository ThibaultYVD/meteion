services:
  app:
    environment:
      - APP_ENV
      - DB_HOST=database
      - DB_USER
      - DB_PASSWORD
      - DB_NAME
      - DB_PORT=3306
      - TOKEN
      - CLIENT_ID
      - IMAGE_BASE_URL
      - TZ=Europe/Paris
      - NODE_ENV=staging
    container_name: meteion_staging
    image: thibaultyvd/meteion:staging
    restart: unless-stopped
    ports:
      - "20221:3000"
    depends_on:
      database: 
        condition: service_healthy
    networks:
      - npm-network
      - meteion-staging-net

  database:
    container_name: meteion_db_staging
    environment:
      - MYSQL_ROOT_PASSWORD
      - MYSQL_DATABASE=meteion_db_staging
      - MYSQL_USER=meteion
      - MYSQL_PASSWORD
      - TZ=Europe/Paris
    image: mysql:8.0
    restart: always
    ports:
      - "33061:3306"
    volumes:
      - db_data_staging:/var/lib/mysql
      - ./scripts/init_staging.sql:/docker-entrypoint-initdb.d/init_staging.sql                                                                                
    networks:                                                                                                          
      - meteion-staging-net

networks:
  npm-network:
    external: true
  meteion-staging-net:                                                                                                    
    driver: bridge

volumes:
  db_data_staging:
