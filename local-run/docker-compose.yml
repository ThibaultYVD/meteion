services:
  database:
    image: mysql:8.0
    container_name: meteion_db_local
    environment:
      MYSQL_ROOT_PASSWORD: localdev
      MYSQL_DATABASE: meteion_local
      TZ: Europe/Paris
    ports:
      - "3306:3306"
    volumes:
      - db_data_local:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-plocaldev",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data_local:
